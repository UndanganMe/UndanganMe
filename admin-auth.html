<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Authentication</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Plus Jakarta Sans',sans-serif;
}

body{
background:#E5E7EB;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:24px;
}

.phone{
width:100%;
max-width:430px;
height:900px;
background:white;
border-radius:42px;
overflow:hidden;
position:relative;
box-shadow:
0 20px 40px rgba(0,0,0,.12),
0 0 0 10px #111827;
}

.notch{
position:absolute;
top:12px;
left:50%;
transform:translateX(-50%);
width:120px;
height:30px;
background:black;
border-radius:999px;
z-index:10;
}

.auth-container{
height:100%;
padding:70px 30px 30px;
display:flex;
flex-direction:column;
justify-content:center;
}

.logo{
text-align:center;
margin-bottom:35px;
}

.logo-circle{
width:90px;
height:90px;
border-radius:50%;
margin:auto;
background:linear-gradient(135deg,#7C3AED,#A855F7);
display:flex;
align-items:center;
justify-content:center;
font-size:36px;
color:white;
font-weight:800;
box-shadow:0 15px 30px rgba(124,58,237,.3);
}

.logo h1{
margin-top:18px;
font-size:24px;
font-weight:800;
color:#0F172A;
}

.logo p{
margin-top:8px;
font-size:13px;
color:#64748B;
}

.tab-switch{
display:flex;
background:#F1F5F9;
border-radius:16px;
padding:5px;
margin-bottom:30px;
}

.auth-tab{
flex:1;
height:46px;
border:none;
background:transparent;
border-radius:12px;
font-weight:700;
cursor:pointer;
color:#64748B;
}

.auth-tab.active{
background:white;
color:#7C3AED;
box-shadow:0 2px 10px rgba(0,0,0,.06);
}

.form-group{
margin-bottom:16px;
}

.form-group label{
display:block;
font-size:13px;
font-weight:700;
margin-bottom:8px;
color:#334155;
}

.form-group input{
width:100%;
height:52px;
padding:0 16px;
border:1px solid #CBD5E1;
border-radius:14px;
font-size:14px;
outline:none;
}

.form-group input:focus{
border-color:#7C3AED;
}

.submit-btn{
width:100%;
height:54px;
border:none;
border-radius:16px;
background:linear-gradient(135deg,#7C3AED,#A855F7);
color:white;
font-size:15px;
font-weight:700;
cursor:pointer;
margin-top:10px;
}

.submit-btn:hover{
opacity:.95;
}

.auth-box{
display:none;
}

.auth-box.active{
display:block;
}

.loading{
display:none;
text-align:center;
margin-top:15px;
font-size:13px;
color:#64748B;
}

.success{
margin-top:15px;
font-size:13px;
text-align:center;
color:#16A34A;
font-weight:700;
}

.error{
margin-top:15px;
font-size:13px;
text-align:center;
color:#DC2626;
font-weight:700;
}

.footer{
margin-top:25px;
text-align:center;
font-size:12px;
color:#94A3B8;
}

@media(max-width:480px){

body{
padding:0;
background:white;
}

.phone{
max-width:100%;
height:100vh;
border-radius:0;
box-shadow:none;
}

.notch{
display:none;
}

}

</style>
</head>
<body>

<div class="phone">

<div class="notch"></div>

<div class="auth-container">

<div class="logo">

<div class="logo-circle">
A
</div>

<h1>Admin Panel</h1>

<p>
Login atau daftar akun admin
</p>

</div>

<div class="tab-switch">

<button
class="auth-tab active"
id="loginTab">
Login
</button>

<button
class="auth-tab"
id="registerTab"
style="display:none;">
Daftar
</button>

</div>

<!-- LOGIN -->

<div
class="auth-box active"
id="loginBox">

<div class="form-group">
<label>Email</label>
<input
type="email"
id="loginEmail"
placeholder="admin@email.com">
</div>

<div class="form-group">
<label>Password</label>
<input
type="password"
id="loginPassword"
placeholder="Masukkan password">
</div>

<button
class="submit-btn"
onclick="loginAdmin()">

Masuk Admin

</button>

</div>

<!-- REGISTER -->

<div
class="auth-box"
id="registerBox">

<div class="form-group">
<label>Nama Admin</label>
<input
type="text"
id="registerName"
placeholder="Nama lengkap">
</div>

<div class="form-group">
<label>Email</label>
<input
type="email"
id="registerEmail"
placeholder="admin@email.com">
</div>

<div class="form-group">
<label>Password</label>
<input
type="password"
id="registerPassword"
placeholder="Minimal 6 karakter">
</div>

<div class="form-group">
<label>Konfirmasi Password</label>
<input
type="password"
id="registerConfirm"
placeholder="Ulangi password">
</div>

<button
class="submit-btn"
onclick="registerAdmin()">

Daftar Admin

</button>

</div>

<div
class="loading"
id="loadingText">
Memproses...
</div>

<div id="message"></div>

<div class="footer">
Undangan Digital Admin System
</div>

</div>

</div>

<script type="module">

import {
initializeApp
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


const firebaseConfig = {
apiKey: "AIzaSyCJE7hxrEd028dNOP0IlkKRnGzuzYMOGmo",
authDomain: "undangan-digital-d05f6.firebaseapp.com",
projectId: "undangan-digital-d05f6",
storageBucket: "undangan-digital-d05f6.firebasestorage.app",
messagingSenderId: "67545163455",
appId: "1:67545163455:web:5e92717868a714b473c80a",
measurementId: "G-XFXBTPVYEQ"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);


const loginTab =
document.getElementById("loginTab");

const registerTab =
document.getElementById("registerTab");

const loginBox =
document.getElementById("loginBox");

const registerBox =
document.getElementById("registerBox");

loginTab.onclick = ()=>{

loginTab.classList.add("active");
registerTab.classList.remove("active");

loginBox.classList.add("active");
registerBox.classList.remove("active");

};

registerTab.onclick = ()=>{

registerTab.classList.add("active");
loginTab.classList.remove("active");

registerBox.classList.add("active");
loginBox.classList.remove("active");

};

function showLoading(status){

document
.getElementById("loadingText")
.style.display =
status ? "block" : "none";

}

function showMessage(text,type){

document
.getElementById("message")
.innerHTML =
`<div class="${type}">
${text}
</div>`;

}

window.registerAdmin =
async function(){

showMessage(
"Pendaftaran admin dinonaktifkan",
"error"
);

}

window.loginAdmin =
async function(){

const email =
document.getElementById("loginEmail").value;

const password =
document.getElementById("loginPassword").value;

try{

showLoading(true);

const result =
await signInWithEmailAndPassword(
auth,
email,
password
);

const allowedAdminEmail = "diptaruna@gmail.com";

if (
    result.user.email.toLowerCase() !==
    allowedAdminEmail.toLowerCase()
) {

    showLoading(false);

    showMessage(
        "Akun bukan admin",
        "error"
    );

    return;
}


localStorage.setItem(
"adminLogin",
"true"
);

localStorage.setItem(
"adminUid",
result.user.uid
);

localStorage.setItem(
"adminName",
result.user.email
);

showLoading(false);

console.log("MENUJU DASHBOARD");

window.location.href =
"admin-undangan.html";

}catch(err){

showLoading(false);

showMessage(
"Email atau password salah",
"error"
);

}

};

</script>

</body>
</html>
