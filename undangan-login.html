<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login & Register - Undangan'Me</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
:root{
    --primary:#d4af37;
    --primary-dark:#b8952e;
    --dark:#1a252f;
    --bg:#f8fafc;
    --muted:#64748b;
    --border:#e2e8f0;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Plus Jakarta Sans',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    linear-gradient(rgba(15,23,42,.85),rgba(15,23,42,.85)),
    url('https://images.unsplash.com/photo-1511285560929-80b456fea0bc?auto=format&fit=crop&w=1200&q=80');
    background-size:cover;
    background-position:center;
    padding:20px;
}

.card{
    width:100%;
    max-width:420px;
    background:#fff;
    border-radius:24px;
    padding:35px;
    box-shadow:0 25px 50px rgba(0,0,0,.2);
}

.logo{
    text-align:center;
    margin-bottom:30px;
}

.logo h1{
    color:var(--dark);
    font-size:2rem;
    font-weight:800;
}

.logo span{
    color:var(--primary);
}

.logo p{
    color:var(--muted);
    font-size:.9rem;
    margin-top:5px;
}

.tabs{
    display:flex;
    background:#f1f5f9;
    border-radius:12px;
    padding:5px;
    margin-bottom:25px;
}

.tab{
    flex:1;
    border:none;
    padding:12px;
    border-radius:10px;
    background:transparent;
    font-weight:700;
    cursor:pointer;
}

.tab.active{
    background:#fff;
    color:var(--primary);
    box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.form{
    display:none;
}

.form.active{
    display:block;
}

.form-group{
    margin-bottom:16px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-size:.9rem;
    font-weight:600;
}

.input-wrap{
    position:relative;
}

.input-wrap input{
    width:100%;
    padding:14px 45px 14px 14px;
    border:1px solid var(--border);
    border-radius:12px;
    outline:none;
}

.input-wrap input:focus{
    border-color:var(--primary);
}

.toggle-password{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    color:#94a3b8;
}

.btn{
    width:100%;
    border:none;
    padding:14px;
    border-radius:12px;
    background:var(--primary);
    color:#fff;
    font-weight:700;
    cursor:pointer;
    margin-top:10px;
}

.btn:hover{
    background:var(--primary-dark);
}

.forgot{
    display:block;
    text-align:right;
    margin-top:10px;
    font-size:.85rem;
    color:var(--primary);
    text-decoration:none;
}

.bottom-text{
    text-align:center;
    margin-top:20px;
    color:var(--muted);
    font-size:.9rem;
}

.bottom-text a{
    color:var(--primary);
    font-weight:700;
    text-decoration:none;
}

.register-footer{
    text-align:center;
    margin-top:18px;
    font-size:.9rem;
    color:var(--muted);
}
</style>
</head>
<body>

<div class="card">

    <div class="logo">
        <h1>Undangan<span>'Me</span></h1>
        <p>Platform Undangan Digital Modern</p>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="showForm('login')">Login</button>
        <button class="tab" onclick="showForm('register')">Daftar</button>
    </div>

    <!-- LOGIN -->
    <form id="loginForm" class="form active">

        <div class="form-group">
            <label>Email</label>
            <div class="input-wrap">
                <input type="email" placeholder="Masukkan email">
            </div>
        </div>

        <div class="form-group">
            <label>Password</label>
            <div class="input-wrap">
                <input type="password" id="loginPassword" placeholder="Masukkan password">
                <i class="fa-solid fa-eye toggle-password"
                   onclick="togglePassword('loginPassword',this)"></i>
            </div>
        </div>

        <a href="#" class="forgot">Lupa Password?</a>

        <button type="button" class="btn" onclick="login()">
            Masuk
        </button>

        <div class="bottom-text">
            Belum punya akun?
            <a href="#" onclick="showForm('register')">
                Silahkan daftar
            </a>
        </div>

    </form>

    <!-- REGISTER -->
    <form id="registerForm" class="form">

        <div class="form-group">
            <label>Nama Lengkap</label>
            <input type="text" placeholder="Nama lengkap">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="Alamat email">
        </div>

        <div class="form-group">
            <label>Password</label>
            <div class="input-wrap">
                <input type="password" id="registerPassword" placeholder="Buat password">
                <i class="fa-solid fa-eye toggle-password"
                   onclick="togglePassword('registerPassword',this)"></i>
            </div>
        </div>

        <div class="form-group">
            <label>Konfirmasi Password</label>
            <div class="input-wrap">
                <input type="password" id="confirmPassword" placeholder="Ulangi password">
                <i class="fa-solid fa-eye toggle-password"
                   onclick="togglePassword('confirmPassword',this)"></i>
            </div>
        </div>

        <button type="button" class="btn">
            Daftar Sekarang
        </button>

        <div class="register-footer">
            Sudah punya akun?
            <a href="#" onclick="showForm('login')" style="color:#d4af37;font-weight:700">
                Login
            </a>
        </div>

    </form>

</div>

<script>

function showForm(type){

    const loginForm=document.getElementById('loginForm');
    const registerForm=document.getElementById('registerForm');

    const tabs=document.querySelectorAll('.tab');

    tabs.forEach(tab=>tab.classList.remove('active'));

    if(type==='login'){
        loginForm.classList.add('active');
        registerForm.classList.remove('active');
        tabs[0].classList.add('active');
    }else{
        registerForm.classList.add('active');
        loginForm.classList.remove('active');
        tabs[1].classList.add('active');
    }
}

function togglePassword(id,icon){

    const input=document.getElementById(id);

    if(input.type==="password"){
        input.type="text";
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
    }else{
        input.type="password";
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
    }
}

function login(){

    // nanti ganti dengan validasi database/backend

    window.location.href="dashboard-undangan-user.html";
}
</script>

</body>
</html>
